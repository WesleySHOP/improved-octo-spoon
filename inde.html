<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIWADOO - Comment passer une commande</title>

  <!-- Police Barlow -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Barlow', sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* permet de scroller */
      min-height: 100vh;
      padding: 20px 0;
    }

    .container {
      text-align: center;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      max-width: 500px; /* réduit la taille */
      width: 90%;
      border-top: 6px solid red;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: red;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: 700;
      color: #000;
    }

    .video-box {
      border: 3px solid red;
      border-radius: 12px;
      padding: 4px;
      background: black;
      margin-bottom: 10px;
    }

    video {
      width: 100%;
      max-height: 300px; /* limite hauteur vidéo */
      object-fit: contain;
      border-radius: 10px;
      display: block;
    }

    p {
      font-size: 13px;
      color: #333;
    }

    .cta {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 18px;
      background: red;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
    }

    .cta:hover {
      background: #cc0000;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">MIWADOO</div>
    <div class="subtitle">Commande simple et rapide</div>

    <h1>📱 Comment passer une commande</h1>

    <div class="video-box">
      <video controls>
        <source src="0325 (1)(3).mp4" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo.
      </video>
    </div>

    <p>Suivez les étapes dans cette vidéo pour passer votre commande facilement.</p>

    <a href="#" class="cta">COMMANDER MAINTENANT</a>

  </div>

</body>
</html>
